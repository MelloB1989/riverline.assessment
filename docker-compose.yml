name: riverline

x-backend-env: &backend-env
  PORT: "9000"
  ENV: DEV
  REDIS_URL: redis://redis:6379/0
  TEMPORAL_HOST_PORT: temporal:7233

services:
  redis:
    image: redis:7-alpine
    profiles: ["dev", "prod"]
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  temporal:
    image: temporalio/auto-setup:1.28
    profiles: ["dev"]
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: riverline
      POSTGRES_PWD: riverline_dev_password
      POSTGRES_SEEDS: postgres-dev
      DBNAME: temporal_dev
      VISIBILITY_DBNAME: temporal_visibility_dev
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/docker.yaml
    depends_on:
      postgres-dev:
        condition: service_healthy
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address temporal:7233 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  temporal-ui:
    image: temporalio/ui:2.40.1
    profiles: ["dev"]
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    depends_on:
      temporal:
        condition: service_healthy
    ports:
      - "8080:8080"

  postgres-dev:
    image: postgres:16-alpine
    profiles: ["dev"]
    environment:
      POSTGRES_USER: riverline
      POSTGRES_PASSWORD: riverline_dev_password
      POSTGRES_DB: riverline_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riverline -d riverline_dev"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres-prod:
    image: postgres:16-alpine
    profiles: ["prod"]
    environment:
      POSTGRES_USER: riverline
      POSTGRES_PASSWORD: ${POSTGRES_PROD_PASSWORD:-riverline_prod_password}
      POSTGRES_DB: riverline_prod
    ports:
      - "5432:5432"
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riverline -d riverline_prod"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate-dev:
    image: oven/bun:1.3.13
    profiles: ["dev"]
    working_dir: /app/database
    depends_on:
      postgres-dev:
        condition: service_healthy
    environment:
      DB_HOST: postgres-dev
      DB_USER: riverline
      DB_PASSWORD: riverline_dev_password
      DB_NAME: riverline_dev
      DB_PORT: "5432"
      DB_SSL: "false"
    volumes:
      - .:/app
    command:
      [
        "sh",
        "-lc",
        "test -d /app/database/drizzle || { echo 'Missing database/drizzle migrations. Generate migrations locally first with bun run db:generate.'; exit 1; } && bunx drizzle-kit migrate",
      ]

  drizzle-studio:
    image: oven/bun:1.3.13
    profiles: ["dev"]
    working_dir: /app/database
    depends_on:
      postgres-dev:
        condition: service_healthy
      migrate-dev:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres-dev
      DB_USER: riverline
      DB_PASSWORD: riverline_dev_password
      DB_NAME: riverline_dev
      DB_PORT: "5432"
      DB_SSL: "false"
    volumes:
      - .:/app
      - web-root-node-modules:/app/node_modules
    ports:
      - "4983:4983"
    command: ["sh", "-lc", "bunx drizzle-kit studio --host 0.0.0.0 --port 4983"]

  migrate-prod:
    image: oven/bun:1.3.13
    profiles: ["prod"]
    working_dir: /app/database
    depends_on:
      postgres-prod:
        condition: service_healthy
    environment:
      DB_HOST: postgres-prod
      DB_USER: riverline
      DB_PASSWORD: ${POSTGRES_PROD_PASSWORD:-riverline_prod_password}
      DB_NAME: riverline_prod
      DB_PORT: "5432"
      DB_SSL: "false"
    volumes:
      - .:/app
    command:
      [
        "sh",
        "-lc",
        "test -d /app/database/drizzle || { echo 'Missing database/drizzle migrations. Generate migrations locally first with bun run db:generate.'; exit 1; } && bunx drizzle-kit migrate",
      ]

  backend-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: services/server/Dockerfile
      target: dev
    env_file:
      - ./services/server/.env
    environment:
      <<: *backend-env
      DATABASE_URL: postgres://riverline:riverline_dev_password@postgres-dev:5432/riverline_dev?sslmode=disable
    depends_on:
      migrate-dev:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
    ports:
      - "9000:9000"
    volumes:
      - ./services/server:/app/services/server
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build

  worker-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: services/server/Dockerfile
      target: dev
    env_file:
      - ./services/server/.env
    environment:
      <<: *backend-env
      DATABASE_URL: postgres://riverline:riverline_dev_password@postgres-dev:5432/riverline_dev?sslmode=disable
    depends_on:
      backend-dev:
        condition: service_started
      temporal:
        condition: service_healthy
    volumes:
      - ./services/server:/app/services/server
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    command: ["go", "run", "./cmd/worker"]

  backend-prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: services/server/Dockerfile
      target: prod
    env_file:
      - ./services/server/.env
    environment:
      <<: *backend-env
      ENV: PROD
      DATABASE_URL: postgres://riverline:${POSTGRES_PROD_PASSWORD:-riverline_prod_password}@postgres-prod:5432/riverline_prod?sslmode=disable
    depends_on:
      migrate-prod:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "9000:9000"

  web-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    env_file:
      - ./apps/web/.env.local
    environment:
      NODE_ENV: development
      API_URL: http://backend-dev:9000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:9000}
    depends_on:
      - backend-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - web-root-node-modules:/app/node_modules
      - web-node-modules:/app/apps/web/node_modules
      - web-next-cache:/app/apps/web/.next

  web-prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: prod
    env_file:
      - ./apps/web/.env
    environment:
      NODE_ENV: production
      API_URL: http://backend-prod:9000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:9000}
    depends_on:
      - backend-prod
    ports:
      - "3000:3000"

volumes:
  redis-data:
  postgres-dev-data:
  postgres-prod-data:
  go-mod-cache:
  go-build-cache:
  web-root-node-modules:
  web-node-modules:
  web-next-cache:
